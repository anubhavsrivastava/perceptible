<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Perceptible - Ad Impression Telemetry</title>
		<link rel="stylesheet" href="sample-theme.css" />
	</head>
	<body style="height:2200px;">
		<div class="sample-header">
			<h1>Ad Impression Telemetry Example</h1>
			<p>Measures MRC ad compliance (100% surface threshold). Click the element or inspect the telemetry panel for exact duration telemetry.</p>
		</div>

		<div id="ad" class="trackable-box" style="width: 320px; height: 220px; margin-top: 30px; border-color: rgba(245, 158, 11, 0.4); cursor: pointer;">
			ADVERTISEMENT (#ad)
			<br /><br />
			<div style="font-size: 0.85rem; color: #fde68a;">Click element to trigger impression event</div>
		</div>

		<script src="../dist/bundle.js"></script>
		<script src="sample-widget.js"></script>
		<script>
			var clickCount = 0;
			var t1 = new Perceptor(document.querySelector('#ad'), {
				threshold: 100,
				scheduler: { interval: 500 },
				clickHandler: function(e, f) {
					clickCount++;
					console.log('Ad click count:', clickCount);
				}
			});
			t1.watch();
		</script>
	</body>
</html>
