<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Perceptible - Multiple Targets Example</title>
		<link rel="stylesheet" href="sample-theme.css" />
	</head>
	<body style="height:2500px;">
		<div class="sample-header">
			<h1>Multiple Target Tracking</h1>
			<p>Observe independent state updates for two separate elements as you scroll down the page.</p>
		</div>

		<div id="testDiv" class="trackable-box" style="width: 320px; height: 180px; margin-top: 30px;">
			First Tracked Element (#testDiv)
		</div>

		<div style="height: 600px;"></div>

		<div id="testDiv2" class="trackable-box" style="width: 320px; height: 180px;">
			Second Tracked Element (#testDiv2)
		</div>

		<script src="../dist/bundle.js"></script>
		<script src="sample-widget.js"></script>
		<script>
			var t1 = new Perceptor(document.querySelector('#testDiv'));
			t1.watch();
			var t2 = new Perceptor(document.querySelector('#testDiv2'));
			t2.watch();
		</script>
	</body>
</html>
