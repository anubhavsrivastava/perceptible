<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Perceptible - Basic Sample</title>
		<link rel="stylesheet" href="sample-theme.css" />
	</head>
	<body style="height:2200px;">
		<div class="sample-header">
			<h1>Basic Viewability Example</h1>
			<p>Scroll down to observe real-time surface percentage and duration tracking in the Live Telemetry Widget.</p>
		</div>

		<div id="testdiv" class="trackable-box" style="height:150px;width:250px;margin-top:40px;">
			Target Element (#testdiv)
		</div>

		<script src="../dist/bundle.js"></script>
		<script src="sample-widget.js"></script>
		<script>
			var tObserve = new Perceptor(document.querySelector('#testdiv'));
			tObserve.watch();
		</script>
	</body>
</html>
